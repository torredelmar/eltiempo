  <meta charset="UTF-8">
  <title>El Tiempo en Torre del Mar</title>
  
<!-- ⚠️ Requiere API Key de OpenWeather -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const apiKey = "fd12f207030d70443a4136802259ed7f";
  const lat = 36.7428;
  const lon = -4.0991;

  async function getWeatherData() {
    const resWeather = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&lang=es&appid=${apiKey}`);
    const resAir = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution/forecast?lat=${lat}&lon=${lon}&appid=${apiKey}`);
    const weather = await resWeather.json();
    const air = await resAir.json();

    const groupedDays = [[], [], []];

    const today = new Date().getDate();
    weather.list.forEach(entry => {
      const entryDate = new Date(entry.dt_txt);
      const dayOffset = entryDate.getDate() - today;
      if (dayOffset >= 0 && dayOffset < 3) groupedDays[dayOffset].push(entry);
    });

    const container = document.querySelector(".container");
    container.innerHTML = `<h1>El Tiempo en Torre del Mar</h1>`;

    const labels = [];
    const aqiData = [];
    const cloudData = [];
    const sunData = [];

    groupedDays.forEach((entries, i) => {
      if (entries.length === 0) return;
      const date = new Date(entries[0].dt_txt);
      const diaSemana = date.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });

      let tempMax = -Infinity, tempMin = Infinity;
      let precip = 0, clouds = 0, wind = 0, humidity = 0, sunHours = 0;
      entries.forEach(e => {
        tempMax = Math.max(tempMax, e.main.temp_max);
        tempMin = Math.min(tempMin, e.main.temp_min);
        precip += e.rain?.["3h"] || 0;
        clouds += e.clouds.all;
        wind += e.wind.speed;
        humidity += e.main.humidity;
        if (e.weather[0].main.toLowerCase().includes("clear")) sunHours += 3;
      });

      clouds = Math.round(clouds / entries.length);
      wind = (wind / entries.length).toFixed(1);
      humidity = Math.round(humidity / entries.length);

      const aqi = air.list[i]?.main.aqi || 2;
      const calidad = ["Buena", "Moderada", "Dañina", "Muy dañina", "Peligrosa"][aqi - 1];

      container.innerHTML += `
        <div class="day-section">
          <h2>${diaSemana}</h2>
          <p><strong>Temperatura:</strong> ${Math.round(tempMin)}–${Math.round(tempMax)} °C</p>
          <p><strong>Precipitaciones:</strong> ${precip.toFixed(1)} mm</p>
          <p><strong>Nubosidad:</strong> ${clouds}%</p>
          <p><strong>Humedad:</strong> ${humidity}%</p>
          <p><strong>Viento:</strong> ${wind} m/s</p>
          <p><strong>Índice UV:</strong> (consulta aparte)</p>
          <p><strong>Calidad del aire:</strong> ${calidad} (AQI: ${aqi})</p>
          <p><strong>Horas de Sol estimadas:</strong> ${sunHours} h</p>
        </div>
      `;

      labels.push(diaSemana.split(',')[0]);
      aqiData.push(aqi * 20);
      cloudData.push(clouds);
      sunData.push(sunHours);
    });

    container.innerHTML += `
      <canvas id="airChart" width="900" height="300"></canvas>
      <canvas id="cloudChart" width="900" height="300"></canvas>
      <canvas id="sunChart" width="900" height="300"></canvas>
    `;

    new Chart(document.getElementById('airChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Índice AQI',
          backgroundColor: 'rgba(255, 99, 132, 0.3)',
          borderColor: 'rgb(255, 99, 132)',
          data: aqiData,
          tension: 0.4,
          fill: true
        }]
      },
      options: { responsive: true }
    });

    new Chart(document.getElementById('cloudChart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Nubosidad (%)',
          backgroundColor: 'rgba(54, 162, 235, 0.7)',
          data: cloudData
        }]
      },
      options: { responsive: true }
    });

    new Chart(document.getElementById('sunChart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Horas de Sol',
          backgroundColor: 'rgba(255, 206, 86, 0.7)',
          data: sunData
        }]
      },
      options: { responsive: true }
    });
  }

  getWeatherData();
</script>
